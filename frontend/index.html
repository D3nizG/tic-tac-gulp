<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Gulp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      function showError(msg) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="color:#f87171;background:#0a0f1e;min-height:100vh;padding:2rem;font-family:monospace;white-space:pre-wrap;font-size:13px;">' + String(msg) + '</div>';
        }
      }
      window.onerror = function(msg, src, line, col, err) {
        showError((err && err.stack) || msg);
      };
      window.addEventListener('unhandledrejection', function(e) {
        showError(e.reason && e.reason.stack || e.reason);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
